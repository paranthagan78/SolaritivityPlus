<!-- ══════════════════════════════════════════
     PANEL: SUMMARY
══════════════════════════════════════════ -->
<div class="panel" id="panel-summary">

    <!-- ── Fullscreen Loading Overlay ── -->
    <div id="summaryOverlay" class="summary-overlay" style="display:none">
        <div class="overlay-content">
            <svg class="sun-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="18" fill="#f59e0b" />
                <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round">
                    <line x1="50" y1="5" x2="50" y2="20" />
                    <line x1="50" y1="80" x2="50" y2="95" />
                    <line x1="5" y1="50" x2="20" y2="50" />
                    <line x1="80" y1="50" x2="95" y2="50" />
                    <line x1="18" y1="18" x2="28" y2="28" />
                    <line x1="72" y1="72" x2="82" y2="82" />
                    <line x1="82" y1="18" x2="72" y2="28" />
                    <line x1="28" y1="72" x2="18" y2="82" />
                </g>
            </svg>
            <div class="overlay-text">Analyzing Solar Data…</div>

        </div>
    </div>

    <!-- ── Hero: Initial State ── -->
    <div id="summaryHero" class="summary-hero">
        <div class="hero-glow"></div>
        <div class="hero-label">AI-Powered Inspection Report</div>
        <button class="summary-orb" onclick="runSummary()" id="summaryOrbBtn">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="orb-sun">
                <circle cx="50" cy="50" r="18" fill="#0f172a" />
                <g stroke="#0f172a" stroke-width="2.5" stroke-linecap="round">
                    <line x1="50" y1="10" x2="50" y2="22" />
                    <line x1="50" y1="78" x2="50" y2="90" />
                    <line x1="10" y1="50" x2="22" y2="50" />
                    <line x1="78" y1="50" x2="90" y2="50" />
                    <line x1="22" y1="22" x2="30" y2="30" />
                    <line x1="70" y1="70" x2="78" y2="78" />
                    <line x1="78" y1="22" x2="70" y2="30" />
                    <line x1="30" y1="70" x2="22" y2="78" />
                </g>
            </svg>
            <span class="orb-label">Generate<br>Summary</span>
        </button>
        <div class="hero-hint">Click to generate a comprehensive AI inspection report</div>

        <div class="summary-actions">
            <button class="action-pill" onclick="runIngest()" id="ingestBtn">

                <span class="pill-text">Ingest Data</span>
            </button>
            <button class="action-pill action-pill-pdf" onclick="showPdfModal()" id="pdfBtn">

                <span class="pill-text">Download PDF</span>
            </button>
        </div>
    </div>

    <!-- ── Status Toast ── -->
    <div id="summaryToast" class="summary-toast" style="display:none"></div>

    <!-- ── Report Display ── -->
    <div id="summaryReport" class="summary-report" style="display:none">
        <div class="report-header">
            <div class="report-header-left">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="32" height="32">
                    <circle cx="50" cy="50" r="18" fill="#f59e0b" />
                    <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round">
                        <line x1="50" y1="5" x2="50" y2="20" />
                        <line x1="50" y1="80" x2="50" y2="95" />
                        <line x1="5" y1="50" x2="20" y2="50" />
                        <line x1="80" y1="50" x2="95" y2="50" />
                        <line x1="18" y1="18" x2="28" y2="28" />
                        <line x1="72" y1="72" x2="82" y2="82" />
                        <line x1="82" y1="18" x2="72" y2="28" />
                        <line x1="28" y1="72" x2="18" y2="82" />
                    </g>
                </svg>
                <span>Solar Panel Inspection Report</span>
            </div>
            <div class="report-header-actions">
                <button class="action-pill action-pill-sm" onclick="runIngest()" id="ingestBtn2">

                    <span class="pill-text">Ingest</span>
                </button>
                <button class="action-pill action-pill-pdf action-pill-sm" onclick="showPdfModal()">

                    <span class="pill-text">PDF</span>
                </button>
                <button class="action-pill action-pill-sm" onclick="regenerateSummary()">

                    <span class="pill-text">Regenerate</span>
                </button>
            </div>
        </div>
        <div id="reportSections"></div>
    </div>

    <!-- ── PDF Filename Modal ── -->
    <div id="pdfModal" class="pdf-modal-overlay" style="display:none">
        <div class="pdf-modal">
            <div class="pdf-modal-title">Export as PDF</div>
            <label class="pdf-modal-label">Report filename</label>
            <input type="text" id="pdfFilenameInput" value="SolarPV_Inspection_Report" placeholder="Enter filename…" />
            <div class="pdf-modal-actions">
                <button class="btn btn-secondary btn-sm" onclick="closePdfModal()">Cancel</button>
                <button class="btn btn-primary btn-sm" onclick="downloadPDF()">Download</button>
            </div>
        </div>
    </div>

    <!-- Next Step Button -->
    <div style="display:flex;justify-content:flex-end;margin-top:1.3rem;">
        <button id="summaryNextBtn" onclick="nextTab('chat')"
            style="background:#111;color:#f59e0b;font-size:0.85rem;padding:0.65rem 1.8rem;border-radius:35px;border:1px solid #222;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:0.05em;display:none;align-items:center;gap:0.5em;box-shadow:0 3px 14px rgba(0,0,0,0.3);outline:none;transition:transform 0.15s,box-shadow 0.2s,border-color 0.2s;"
            onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 22px rgba(0,0,0,0.4)';this.style.borderColor='#f59e0b'"
            onmouseout="this.style.transform='';this.style.boxShadow='0 3px 14px rgba(0,0,0,0.3)';this.style.borderColor='#222'"
            onmousedown="this.style.transform='scale(0.97)'" onmouseup="this.style.transform=''">
            Next Step: AI Assistant
            <svg viewBox="0 0 24 24" width="13" height="13"
                style="stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;">
                <polyline points="9 18 15 12 9 6" />
            </svg>
        </button>
    </div>
</div><!-- /panel-summary -->
