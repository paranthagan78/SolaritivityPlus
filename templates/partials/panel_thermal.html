<!-- ══════════════════════════════════════════
     PANEL: THERMAL
══════════════════════════════════════════ -->
<div class="panel" id="panel-thermal">

    <div class="alert alert-wa" style="margin-bottom:1rem">
        <strong>🌡 Thermal Mode</strong> — Independent hotspot detection workflow.
        Does <em>not</em> affect EL detection or carbon prediction.
    </div>

    <div class="grid2">

        <div class="card">
            <div class="card-title">
                🌡 Thermal / IR Image
                <span class="thermal-tag">SEPARATE</span>
            </div>
            <div class="drop-zone" onclick="document.getElementById('thermalFile').click()">
                <input type="file" id="thermalFile" accept=".png,.jpg,.jpeg,.bmp,.tiff"
                    onchange="previewThermal(this)" />
                <div>Upload thermal or infrared image</div>
                <div class="drop-hint">PNG · JPG · BMP · TIFF</div>
            </div>
            <div id="thermalPreview" style="margin-top:.75rem"></div>
            <button class="btn btn-primary btn-full" id="thermalBtn" style="margin-top:.72rem" onclick="runThermal()"
                disabled>
                Detect Hotspots
            </button>
        </div>

        <div class="card">
            <div class="card-title">🔥 Hotspot Overlay</div>
            <div id="thermalResult" style="color:var(--mu);font-size:.82rem;text-align:center;padding:2.5rem 1rem">
                Hotspot overlay will appear here.
            </div>
        </div>

    </div>

    <!-- Next Step Button -->
    <div style="display:flex;justify-content:flex-end;margin-top:1rem">
        <button class="btn btn-primary" onclick="nextTab('summary')">Next Step: AI Summary ➡</button>
    </div>
</div><!-- /panel-thermal -->
