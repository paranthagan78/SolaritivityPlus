<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0
    }

    :root {
        --a: #f59e0b;
        --a-d: #d97706;
        --bg: #0f172a;
        --s1: #1e293b;
        --s2: #162032;
        --bd: #334155;
        --tx: #e2e8f0;
        --mu: #94a3b8;
        --er: #ef4444;
        --ok: #22c55e;
        --inf: #3b82f6
    }

    body {
        background: var(--bg);
        color: var(--tx);
        font-family: 'Segoe UI', system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column
    }

    /* ── NAV ── */
    nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: .7rem 1.4rem;
        background: var(--s1);
        border-bottom: 1px solid var(--bd);
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 1rem;
        flex-wrap: wrap
    }

    .nav-brand {
        display: flex;
        align-items: center;
        gap: .55rem;
        font-weight: 700;
        color: var(--a);
        font-size: .95rem;
        white-space: nowrap
    }

    .nav-tabs {
        display: flex;
        gap: .2rem;
        flex-wrap: wrap
    }

    .tab {
        padding: .4rem .82rem;
        border: none;
        border-radius: 6px;
        background: none;
        color: var(--mu);
        cursor: pointer;
        font-size: .79rem;
        transition: all .18s;
        white-space: nowrap
    }

    .tab:hover {
        color: var(--tx);
        background: rgba(255, 255, 255, .06)
    }

    .tab.active {
        background: var(--a);
        color: #0f172a;
        font-weight: 700
    }

    .nav-right {
        display: flex;
        align-items: center;
        gap: .7rem;
        white-space: nowrap
    }

    #sessionTimer {
        font-size: .72rem;
        color: var(--mu)
    }

    .logout-btn {
        padding: .35rem .72rem;
        border: 1px solid var(--bd);
        border-radius: 6px;
        background: none;
        color: var(--mu);
        cursor: pointer;
        font-size: .77rem;
        transition: all .18s
    }

    .logout-btn:hover {
        border-color: var(--er);
        color: var(--er)
    }

    /* ── LAYOUT ── */
    main {
        flex: 1;
        padding: 1.2rem;
        max-width: 1280px;
        width: 100%;
        margin: 0 auto
    }

    .panel {
        display: none
    }

    .panel.active {
        display: block
    }

    /* ── CARDS ── */
    .card {
        background: var(--s1);
        border: 1px solid var(--bd);
        border-radius: 10px;
        padding: 1.2rem
    }

    .card+.card {
        margin-top: 1rem
    }

    .card-title {
        font-size: .87rem;
        font-weight: 600;
        color: var(--a);
        margin-bottom: .9rem;
        display: flex;
        align-items: center;
        gap: .45rem
    }

    .card-title small {
        font-size: .68rem;
        color: var(--mu);
        font-weight: 400
    }

    /* ── GRID ── */
    .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem
    }

    .grid3 {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: .7rem
    }

    @media(max-width:750px) {

        .grid2,
        .grid3 {
            grid-template-columns: 1fr
        }
    }

    /* ── DROP ZONE ── */
    .drop-zone {
        border: 2px dashed var(--bd);
        border-radius: 8px;
        padding: 1.7rem 1rem;
        text-align: center;
        cursor: pointer;
        transition: border-color .2s, background .2s;
        color: var(--mu);
        font-size: .84rem;
        user-select: none
    }

    .drop-zone:hover,
    .drop-zone.over {
        border-color: var(--a);
        background: rgba(245, 158, 11, .04);
        color: var(--tx)
    }

    .drop-zone input {
        display: none
    }

    .drop-hint {
        font-size: .71rem;
        color: var(--mu);
        margin-top: .28rem
    }

    /* ── BUTTONS ── */
    .btn {
        padding: .5rem 1rem;
        border: none;
        border-radius: 7px;
        font-size: .82rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity .18s, transform .1s;
        display: inline-flex;
        align-items: center;
        gap: .35rem
    }

    .btn:active {
        transform: scale(.97)
    }

    .btn:disabled {
        opacity: .35;
        cursor: not-allowed;
        transform: none
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--a), var(--a-d));
        color: #0f172a
    }

    .btn-primary:hover:not(:disabled) {
        opacity: .88
    }

    .btn-secondary {
        background: var(--bd);
        color: var(--tx)
    }

    .btn-secondary:hover:not(:disabled) {
        opacity: .82
    }

    .btn-ghost {
        background: none;
        border: 1px solid var(--bd);
        color: var(--mu)
    }

    .btn-ghost:hover:not(:disabled) {
        border-color: var(--a);
        color: var(--a)
    }

    .btn-sm {
        padding: .32rem .65rem;
        font-size: .74rem
    }

    .btn-full {
        width: 100%;
        justify-content: center
    }

    /* ── BADGES ── */
    .badge {
        display: inline-block;
        padding: .15rem .5rem;
        border-radius: 99px;
        font-size: .69rem;
        font-weight: 600
    }

    .badge-ok {
        background: rgba(34, 197, 94, .15);
        color: var(--ok)
    }

    .badge-er {
        background: rgba(239, 68, 68, .15);
        color: var(--er)
    }

    .badge-wa {
        background: rgba(245, 158, 11, .15);
        color: var(--a)
    }

    /* ── FORM ── */
    .form-group {
        margin-bottom: .78rem
    }

    .form-group label {
        font-size: .74rem;
        color: var(--mu);
        display: block;
        margin-bottom: .26rem
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: .7rem
    }

    input[type=text],
    input[type=number],
    select {
        width: 100%;
        padding: .48rem .75rem;
        background: var(--bg);
        border: 1px solid var(--bd);
        border-radius: 7px;
        color: var(--tx);
        font-size: .82rem;
        outline: none;
        transition: border-color .18s
    }

    input:focus,
    select:focus {
        border-color: var(--a)
    }

    /* ── TABLE ── */
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: .77rem
    }

    th,
    td {
        padding: .48rem .68rem;
        text-align: left;
        border-bottom: 1px solid var(--bd)
    }

    th {
        color: var(--mu);
        font-weight: 600;
        font-size: .71rem;
        background: var(--s2)
    }

    tr:last-child td {
        border-bottom: none
    }

    tr:hover td {
        background: rgba(255, 255, 255, .025)
    }

    /* ── IMAGE ── */
    .img-wrap {
        border-radius: 8px;
        overflow: hidden;
        background: var(--bg);
        border: 1px solid var(--bd)
    }

    .img-wrap img {
        width: 100%;
        display: block;
        max-height: 300px;
        object-fit: contain
    }

    /* ── STATS ── */
    .stat {
        text-align: center;
        padding: .8rem .5rem;
        background: var(--s2);
        border-radius: 8px;
        border: 1px solid var(--bd)
    }

    .stat .val {
        font-size: 1.45rem;
        font-weight: 700;
        color: var(--a);
        line-height: 1.2
    }

    .stat .lbl {
        font-size: .68rem;
        color: var(--mu);
        margin-top: .2rem
    }

    /* ── DETECTION LIST ── */
    .det-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: .42rem .68rem;
        background: var(--bg);
        border-radius: 6px;
        border: 1px solid var(--bd);
        margin-bottom: .35rem;
        font-size: .79rem
    }

    .det-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: .48rem;
        flex-shrink: 0
    }

    .det-info {
        display: flex;
        align-items: center;
        flex: 1;
        font-weight: 500
    }

    .det-meta {
        display: flex;
        align-items: center;
        gap: .5rem
    }

    /* ── ALERTS ── */
    .alert {
        padding: .52rem .82rem;
        border-radius: 7px;
        font-size: .79rem;
        line-height: 1.45
    }

    .alert-ok {
        background: rgba(34, 197, 94, .08);
        border: 1px solid rgba(34, 197, 94, .25);
        color: var(--ok)
    }

    .alert-er {
        background: rgba(239, 68, 68, .08);
        border: 1px solid rgba(239, 68, 68, .25);
        color: var(--er)
    }

    .alert-wa {
        background: rgba(245, 158, 11, .08);
        border: 1px solid rgba(245, 158, 11, .25);
        color: var(--a)
    }

    /* ── LOCATION BAR ── */
    .loc-bar {
        display: flex;
        align-items: center;
        gap: .45rem;
        padding: .5rem .75rem;
        background: var(--s2);
        border: 1px solid var(--bd);
        border-radius: 7px;
        font-size: .78rem;
        color: var(--mu);
        margin-bottom: .9rem
    }

    .loc-bar .loc-val {
        color: var(--tx);
        font-weight: 500
    }

    .loc-bar .sep {
        color: var(--bd)
    }

    /* ── CHAT ── */
    .chat-box {
        height: 320px;
        overflow-y: auto;
        padding: .75rem;
        background: var(--bg);
        border: 1px solid var(--bd);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: .65rem;
        scroll-behavior: smooth
    }

    .msg {
        max-width: 86%;
        padding: .52rem .82rem;
        border-radius: 10px;
        font-size: .81rem;
        line-height: 1.55;
        white-space: pre-wrap;
        word-wrap: break-word
    }

    .msg.user {
        background: linear-gradient(135deg, var(--a), var(--a-d));
        color: #0f172a;
        align-self: flex-end;
        border-bottom-right-radius: 3px;
        font-weight: 500
    }

    .msg.bot {
        background: var(--s1);
        border: 1px solid var(--bd);
        align-self: flex-start;
        border-bottom-left-radius: 3px
    }

    .msg.bot.thinking {
        color: var(--mu);
        font-style: italic
    }

    .chat-input-row {
        display: flex;
        gap: .5rem;
        margin-top: .72rem
    }

    .chat-input-row input {
        flex: 1
    }

    /* ── SUMMARY ── */
    .summary-box {
        white-space: pre-wrap;
        font-size: .81rem;
        line-height: 1.75;
        color: var(--tx);
        background: var(--bg);
        border: 1px solid var(--bd);
        border-radius: 8px;
        padding: 1rem;
        max-height: 440px;
        overflow-y: auto;
        font-family: inherit
    }

    /* ── SPINNER ── */
    @keyframes sp {
        to {
            transform: rotate(360deg)
        }
    }

    .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: sp .7s linear infinite;
        vertical-align: middle;
        flex-shrink: 0
    }

    /* ── THERMAL TAG ── */
    .thermal-tag {
        font-size: .66rem;
        background: rgba(239, 68, 68, .18);
        color: #fca5a5;
        padding: .1rem .42rem;
        border-radius: 4px;
        font-weight: 600;
        letter-spacing: .03em
    }

    /* ── DIVIDER ── */
    .divider {
        height: 1px;
        background: var(--bd);
        margin: .9rem 0
    }
</style>
