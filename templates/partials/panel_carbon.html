<!-- ══════════════════════════════════════════
     PANEL: CARBON
══════════════════════════════════════════ -->
<div class="panel" id="panel-carbon">
    <div class="grid2">

        <!-- Left: inputs -->
        <div class="card">
            <div class="card-title">🌍 Carbon Emission Prediction</div>

            <!-- Location bar -->
            <div class="loc-bar">
                <span>📍</span>
                <span id="locCity" class="loc-val">—</span>
                <span class="sep">|</span>
                <span>🌡</span>
                <span id="locTemp" class="loc-val">— °C</span>
                <button class="btn btn-ghost btn-sm" onclick="fetchWeather()" style="margin-left:auto">
                    Auto-fill
                </button>
            </div>

            <div id="carbonNote" class="alert alert-wa" style="margin-bottom:.9rem">
                ⚠ Run detection first, then predict carbon emission.
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>City</label>
                    <select id="carbonCity">
                        <option>Chennai</option>
                        <option>Mumbai</option>
                        <option>Delhi</option>
                        <option>Bangalore</option>
                        <option>Hyderabad</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Panel Power (W)</label>
                    <input type="number" id="carbonPower" value="380" min="1" />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Ambient Temp (°C)</label>
                    <input type="number" id="carbonTemp" value="32" />
                </div>
                <div class="form-group">
                    <label>Irradiance (W/m²)</label>
                    <input type="number" id="carbonIrr" value="900" min="0" />
                </div>
            </div>

            <button class="btn btn-primary btn-full" onclick="runCarbon()">
                Predict CO₂ Emission
            </button>
        </div>

        <!-- Right: result -->
        <div class="card">
            <div class="card-title">📈 Carbon Results</div>
            <div id="carbonResult" style="color:var(--mu);font-size:.82rem;text-align:center;padding:2.5rem 1rem">
                Carbon prediction will appear here.
            </div>
        </div>

    </div>

    <!-- Next Step Button -->
    <div style="display:flex;justify-content:flex-end;margin-top:1rem">
        <button class="btn btn-primary" onclick="nextTab('xai')">Next Step: XAI Analysis ➡</button>
    </div>
</div><!-- /panel-carbon -->
