<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Solaritivity</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --orange:#ff8c00;
    --orange-dim:rgba(255,140,0,0.18);
    --orange-glow:rgba(255,140,0,0.06);
  }

  html,body{
    width:100%;height:100%;
    background:#000;
    font-family:'Outfit',sans-serif;
    overflow:hidden;
  }

  /* ── Canvas ── */
  canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

  /* ── Center stage ── */
  .stage{
    position:fixed;inset:0;z-index:1;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:1.6rem;
  }

  /* ── Brand ── */
  .brand{
    font-size:1.12rem;
    font-weight:300;
    letter-spacing:.55em;
    color:rgba(255,140,0,0.45);
    text-transform:uppercase;
    user-select:none;
  }

  /* ── Label ── */
  .label{
    font-size:.68rem;
    font-weight:300;
    letter-spacing:.3em;
    color:rgba(255,255,255,0.22);
    text-transform:uppercase;
    user-select:none;
    margin-bottom:-.8rem;
  }

  /* ── Input row ── */
  .row{
    display:flex;
    align-items:center;
    gap:.7rem;
  }

  input[type="password"],input[type="text"]{
    background:transparent;
    border:none;
    border-bottom:1px solid rgba(255,140,0,0.25);
    outline:none;
    color:#fff;
    font-family:'Outfit',sans-serif;
    font-size:1.3rem;
    font-weight:200;
    letter-spacing:.35em;
    width:220px;
    padding:.5rem .2rem;
    caret-color:var(--orange);
    transition:border-color .3s;
    border-radius:0;
    /* hide browser password bullets' extra spacing */
    text-align:center;
  }

  input::placeholder{
    letter-spacing:.2em;
    color:rgba(255,255,255,0.1);
    font-size:.9rem;
  }

  input:focus{
    border-bottom-color:rgba(255,140,0,0.7);
  }

  /* ── Arrow button ── */
  .go{
    width:40px;height:40px;
    border-radius:50%;
    border:1px solid rgba(255,140,0,0.3);
    background:transparent;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .3s, background .3s, transform .15s;
    flex-shrink:0;
  }

  .go svg{
    width:14px;height:14px;
    stroke:rgba(255,140,0,0.6);
    fill:none;
    stroke-width:2;
    stroke-linecap:round;
    stroke-linejoin:round;
    transition:stroke .3s, transform .2s;
  }

  .go:hover{
    border-color:rgba(255,140,0,0.8);
    background:rgba(255,140,0,0.07);
  }
  .go:hover svg{stroke:var(--orange);transform:translateX(2px)}
  .go:active{transform:scale(.92)}
  .go.loading{pointer-events:none;}
  .go.loading svg{animation:spin .6s linear infinite}

  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Feedback ── */
  .fb{
    font-size:.62rem;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:rgba(255,140,0,0);
    min-height:.9rem;
    transition:color .3s, opacity .3s;
    user-select:none;
    text-align:center;
  }
  .fb.err{color:rgba(255,80,60,0.7)}
  .fb.ok{color:rgba(255,140,0,0.7)}

  /* ── Shake ── */
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
  .shake{animation:shake .35s ease}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="stage">
  <div class="brand">Solaritivity</div>
  <div class="label">Enter Passcode</div>
  <div class="row">
    <input id="pc" type="password" placeholder="· · · · · · · ·" autocomplete="current-password" autofocus/>
    <button class="go" id="go" title="Unlock">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
  <div class="fb" id="fb"></div>
</div>

<script>
/* ═══════════════════════════════════════
   Shooting stars
═══════════════════════════════════════ */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
const resize=()=>{W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight};
resize();window.addEventListener('resize',resize);

const STAR_COUNT=320;
const stars=[];

function mkStar(){
  // Start from top-right region, fall toward bottom-left
  const edge=Math.random();
  let x,y;
  if(edge<.5){x=Math.random()*W*1.3;y=-10;}
  else{x=W+10;y=Math.random()*H*.6;}
  const spd=.4+Math.random()*1.2;
  const len=18+Math.random()*55;
  const alpha=.25+Math.random()*.55;
  return{x,y,spd,len,alpha,dx:-spd*.62,dy:spd,life:1,decay:.004+Math.random()*.006};
}

for(let i=0;i<STAR_COUNT;i++){
  const s=mkStar();
  // scatter them at start
  s.x=Math.random()*W*1.4;
  s.y=Math.random()*H*1.2;
  stars.push(s);
}

function drawStars(){
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<stars.length;i++){
    const s=stars[i];
    s.x+=s.dx;s.y+=s.dy;
    s.life-=s.decay;
    if(s.life<=0||s.x<-60||s.y>H+60){Object.assign(stars[i],mkStar());continue;}
    const a=s.life*s.alpha;
    const grd=ctx.createLinearGradient(s.x,s.y,s.x-s.dx*(s.len/s.spd),s.y-s.dy*(s.len/s.spd));
    grd.addColorStop(0,`rgba(255,140,0,${a})`);
    grd.addColorStop(1,`rgba(255,140,0,0)`);
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-s.dx*(s.len/s.spd),s.y-s.dy*(s.len/s.spd));
    ctx.strokeStyle=grd;
    ctx.lineWidth=.45+Math.random()*.3;
    ctx.stroke();
  }
  requestAnimationFrame(drawStars);
}
drawStars();

/* ═══════════════════════════════════════
   Auth
═══════════════════════════════════════ */
const pcEl=document.getElementById('pc');
const goEl=document.getElementById('go');
const fbEl=document.getElementById('fb');

let locked=false;

async function doLogin(){
  if(locked)return;
  const p=pcEl.value.trim();
  if(!p){shake();return;}
  goEl.classList.add('loading');
  goEl.querySelector('svg').innerHTML='<path d="M12 2a10 10 0 1 0 0 20"/>';
  locked=true;
  try{
    const r=await fetch('/api/auth/login',{method:'POST',credentials:'include',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({passcode:p})});
    const d=await r.json();
    if(d.success){
      msg('✓','ok');
      setTimeout(()=>location.href='/dashboard',800);
    }else{
      pcEl.value='';shake();
      if(d.code==='LOCKED_OUT'){
        msg(`locked · ${d.retry_after}s`,'err');
        countdown(d.retry_after);
      }else{
        const rem=d.attempts_remaining;
        msg(rem>0?`${rem} attempt${rem!==1?'s':''} remaining`:'max attempts','err');
        locked=false;resetBtn();
      }
    }
  }catch(e){msg('network error','err');locked=false;resetBtn();}
}

function countdown(t){
  const iv=setInterval(()=>{
    t--;
    if(t<=0){clearInterval(iv);msg('','');locked=false;resetBtn();}
    else msg(`locked · ${t}s`,'err');
  },1000);
}

function resetBtn(){
  goEl.classList.remove('loading');
  goEl.querySelector('svg').innerHTML='<polyline points="9 18 15 12 9 6"/>';
}

function msg(m,cls){
  fbEl.textContent=m;
  fbEl.className='fb'+(cls?' '+cls:'');
}

function shake(){
  pcEl.classList.remove('shake');
  void pcEl.offsetWidth;
  pcEl.classList.add('shake');
  pcEl.addEventListener('animationend',()=>pcEl.classList.remove('shake'),{once:true});
}

goEl.addEventListener('click',doLogin);
pcEl.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

/* check if already logged in */
(async()=>{
  try{
    const r=await fetch('/api/auth/status',{credentials:'include'});
    const d=await r.json();
    if(d.authenticated)location.href='/dashboard';
  }catch(e){}
})();
</script>
</body>
</html>
